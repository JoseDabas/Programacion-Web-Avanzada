spring:
  datasource:
    url: jdbc:postgresql://postgres-db:5432/hotel_relational_db
    username: user_hotel
    password: password_hotel
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
server:
  port: 8082
