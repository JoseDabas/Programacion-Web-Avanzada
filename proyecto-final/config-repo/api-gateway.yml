server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ # Realza el registro en Eureka
  instance:
    prefer-ip-address: true

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true # Permite crear rutas automáticas basándose en los nombres de Eureka
          lower-case-service-id: true