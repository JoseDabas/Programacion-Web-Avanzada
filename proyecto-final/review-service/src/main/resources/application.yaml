server:
  port: 8083

spring:
  application:
    name: review-service
  datasource:
    url: jdbc:postgresql://postgres-db:5432/hotel_relational_db
    username: user_hotel
    password: password_hotel
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://discover-server:8761/eureka/
  instance:
    prefer-ip-address: true
