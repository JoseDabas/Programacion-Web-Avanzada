server:
  # Puerto interno estandar para nuestro microservicio de Reservas
  port: 8082

spring:
  application:
    name: booking-service
  datasource:
    # URL apuntando al contenedor postgres-db dentro de nuestra docker network
    url: jdbc:postgresql://postgres-db:5432/hotel_relational_db
    username: user_hotel
    password: password_hotel
    driver-class-name: org.postgresql.Driver
  jpa:
    # Estrategia update para crear tablas automaticamente a partir de modelos Entity en el primer run
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://discover-server:8761/eureka/
  instance:
    prefer-ip-address: true
