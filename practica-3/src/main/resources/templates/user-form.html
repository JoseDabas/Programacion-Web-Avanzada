<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <title th:text="#{user.create.title}">Nuevo Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/main.css}" rel="stylesheet" />
</head>

<body class="d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-lg" style="width: 400px;">
        <div class="card-header text-center bg-white border-0 pt-4">
            <h4 class="mb-0 fw-bold" th:text="#{user.create.title}">Crear Usuario</h4>
        </div>
        <div class="card-body p-4">

            <div th:if="${param.error}" class="alert alert-danger" th:text="#{user.form.error}">
                Error: El usuario ya existe o datos inválidos.
            </div>

            <form action="/users/save" method="post">
                <div class="mb-3">
                    <label class="form-label" th:text="#{login.username}">Usuario</label>
                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" th:text="#{login.password}">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <div class="mb-3 form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="isAdmin" id="adminCheck">
                    <label class="form-check-label fw-bold" for="adminCheck" th:text="#{user.form.admin.label}">
                        ¿Otorgar Permisos de Administrador?
                    </label>
                    <small class="d-block text-muted" th:text="#{user.form.admin.help}">Si se marca, el usuario podrá
                        gestionar otros usuarios.</small>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary" th:text="#{user.create.button}">Guardar</button>
                    <a href="/users" class="btn btn-secondary" th:text="#{btn.cancel}">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
