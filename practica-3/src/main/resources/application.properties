# Configuración del Servidor
server.port=8080

spring.application.name=${SPRING_APPLICATION_NAME:mockup-api}

# Configuración Base de Datos H2 (Modo Servidor TCP)
spring.datasource.url=jdbc:h2:tcp://${DB_HOST:db}:1521/${DB_NAME:mockup_db}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

# Habilitar consola H2 (Acceso en navegador: /h2-console)
spring.h2.console.enabled=true

# Importante para Spring Security: permitir frames
spring.h2.console.settings.web-allow-others=true

# JPA / Hibernate para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

# Internacionalización (i18n) 
spring.messages.basename=${SPRING_MESSAGES_BASENAME:messages/messages}
spring.messages.encoding=${SPRING_MESSAGES_ENCODING:UTF-8}
spring.messages.fallback-to-system-locale=true