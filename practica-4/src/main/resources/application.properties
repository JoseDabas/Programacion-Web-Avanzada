# ==========================================
# Configuración del servidor y aplicación
# ==========================================
server.port=8080

# ==========================================
# Configuración de Base de Datos PostgreSQL
# ==========================================
# Asegúrate de crear una base de datos local llamada "sensores_db"
# O edita esta URL para que apunte a la tuya.
spring.datasource.url=jdbc:postgresql://localhost:5432/sensores_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# Configuración de JPA / Hibernate
# ==========================================
# update: actualiza automáticamente el esquema de la base de datos (crea la tabla si no existe)
spring.jpa.hibernate.ddl-auto=update
# Muestra por consola las sentencias SQL que ejecuta Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Configuración del Broker ActiveMQ
# ==========================================
# Conexión al ActiveMQ local en el puerto por defecto de mensajería (61616)
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin
