<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Sensores en Tiempo Real</title>

    <!-- Estilos básicos para la presentación visual (estética vanilla CSS, fondo dark mode y minimalismo) -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            border-bottom: 2px solid #00c853;
            padding-bottom: 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        .status-bar {
            margin-bottom: 20px;
            padding: 10px 20px;
            background-color: #1e1e1e;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .status-indicator {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: #d32f2f; /* Rojo de desconectado por defecto */
            transition: background-color 0.3s;
        }

        .status-indicator.connected {
            background-color: #00e676; /* Verde de conectado */
            box-shadow: 0 0 10px #00e676;
        }

        .charts-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 100%;
            max-width: 1000px;
        }

        /* Envoltorios para mantener proporciones en Canvas responsivo */
        .chart-wrapper {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        canvas {
            width: 100% !important;
            height: 400px !important;
        }
    </style>
</head>
<body>

    <h1>Tablero de Sensores IoT</h1>

    <div class="status-bar">
        <div id="connection-status" class="status-indicator"></div>
        <span id="connection-text">Desconectado del Servidor</span>
    </div>

    <div class="charts-container">
        <!-- Gráfico 1: Temperatura -->
        <div class="chart-wrapper">
            <canvas id="temperaturaChart"></canvas>
        </div>

        <!-- Gráfico 2: Humedad -->
        <div class="chart-wrapper">
            <canvas id="humedadChart"></canvas>
        </div>
    </div>

    <!-- Librerías de terceros (WebSockets y Gráficos) -->
    <!-- SockJS: Proveedor de conexión de retroceso si los WebSockets nativos fallan -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    
    <!-- STOMP: Protocolo de mensajería orientada a texto basado en WebSockets -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    
    <!-- Chart.js: Librería de gráficos en Canvas interactiva y renderización visual -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Nuestro script personalizado que unifica la lógica de negocio -->
    <script src="app.js"></script>

</body>
</html>
