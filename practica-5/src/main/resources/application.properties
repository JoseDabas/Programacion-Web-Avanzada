# Configuración del Servidor
server.port=${SERVER_PORT:8080}

spring.application.name=${SPRING_APPLICATION_NAME:mockup-api}

# Configuración base de datos (se inyectan por variables de entorno de docker)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/mockupdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuración Redis y Sesiones
spring.session.store-type=redis
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=6379


# Internacionalización (i18n) 
spring.messages.basename=${SPRING_MESSAGES_BASENAME:messages/messages}
spring.messages.encoding=${SPRING_MESSAGES_ENCODING:UTF-8}
spring.messages.fallback-to-system-locale=true