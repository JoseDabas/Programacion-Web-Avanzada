<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <title th:text="#{user.list.title}">Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet" />
</head>

<body>

    <!-- Navbar simple -->
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/projects" th:text="#{app.title}">Mockup Server</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/projects" th:text="#{menu.projects}">Proyectos</a>
                    </li>
                    <!-- Enlace activo -->
                    <li class="nav-item"><a class="nav-link active" href="/users" th:text="#{menu.users}">Usuarios</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 th:text="#{user.list.title}" class="fw-bold">Gestión de Usuarios</h2>
            <a href="/users/create" class="btn btn-primary">
                <i class="fas fa-user-plus"></i> <span th:text="#{user.create.title}">Nuevo Usuario</span>
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th th:text="#{user.table.id}">ID</th>
                            <th th:text="#{login.username}">Usuario</th>
                            <th th:text="#{user.table.roles}">Roles</th>
                            <th th:text="#{user.table.status}">Estado</th>
                            <th th:text="#{user.table.actions}">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}">1</td>
                            <td th:text="${user.username}" class="fw-bold">admin</td>
                            <td>
                                <span th:each="role : ${user.roles}" class="badge bg-secondary me-1"
                                    th:text="${role.name.replace('ROLE_', '')}">ADMIN</span>
                            </td>
                            <td>
                                <span th:if="${user.active}" class="badge bg-primary">Activo</span>
                                <span th:unless="${user.active}" class="badge bg-secondary">Inactivo</span>
                            </td>
                            <td>
                                <!-- No permitir borrar al admin principal -->
                                <a th:if="${user.username != 'admin'}" th:href="@{'/users/toggle/' + ${user.id}}"
                                    class="btn btn-sm btn-outline-secondary">
                                    <i class="fas fa-power-off"></i> <span th:text="#{user.btn.change_status}">Cambiar
                                        Estado</span>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>

</html>
