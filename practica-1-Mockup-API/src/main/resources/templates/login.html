<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Login - Mockup Server</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link th:href="@{/css/main.css}" rel="stylesheet" />
</head>

<body>
  <div class="login-container">
    <div class="card login-card">
      <div class="card-body p-5">
        <h3 class="login-title mb-4">Mockup Server</h3>

        <!-- Mensajes de Error / Logout -->
        <div th:if="${param.error}" class="error-message mb-3">
          Usuario o contraseña incorrectos.
        </div>

        <!-- Formulario -->
        <form th:action="@{/login}" method="post">
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" name="username" class="form-control" placeholder="usuario" required autofocus />
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" placeholder="password" required />
          </div>
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-login btn-lg">
              Ingresar
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
