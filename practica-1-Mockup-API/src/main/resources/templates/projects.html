<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">

<head>
  <meta charset="UTF-8">
  <title th:text="#{project.list.title}">Mis Proyectos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link th:href="@{/css/main.css}" rel="stylesheet" />
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg mb-4">
    <div class="container">

      <!-- 1. Logo / Marca -->
      <a class="navbar-brand fw-bold" href="/projects" th:text="#{app.title}">Mockup Server</a>

      <!-- Botón Hamburguesa para Móviles -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Contenido del Menú (Colapsable) -->
      <div class="collapse navbar-collapse" id="navbarContent">

        <!-- 2. Menú de Navegación (Izquierda) -->
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <!-- Enlace siempre visible -->
          <li class="nav-item">
            <a class="nav-link active" href="/projects" th:text="#{menu.projects}">Proyectos</a>
          </li>

          <!-- NUEVO ENLACE: SOLO VISIBLE PARA ADMIN -->
          <li class="nav-item" sec:authorize="hasRole('ADMIN')">
            <a class="nav-link" href="/users" th:text="#{menu.users}">
              Usuarios
            </a>
          </li>
        </ul>

        <!-- 3. Información de Usuario y Salir (Derecha) -->
        <div class="d-flex align-items-center">
          <span class="navbar-text me-3">
            <span th:text="${#authentication.name}" class="fw-bold">Usuario</span>
          </span>
          <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-danger btn-sm" th:text="#{login.logout}">Salir</button>
          </form>
        </div>

      </div>
    </div>
  </nav>

  <div class="container">
    <!-- Encabezado y Botón Crear -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold" th:text="#{project.list.title}">Mis Proyectos</h2>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createProjectModal">
        <i class="fas fa-plus"></i> <span th:text="#{project.btn.new}">Nuevo Proyecto</span>
      </button>
    </div>

    <!-- Alerta si no hay proyectos -->
    <div th:if="${projects.empty}" class="alert alert-light border text-center shadow-sm"
      th:text="#{project.list.empty}">
      No tienes proyectos creados. ¡Crea el primero!
    </div>

    <!-- Lista de Proyectos (Cards) -->
    <div class="row row-cols-1 row-cols-md-3 g-4">
      <div class="col" th:each="project : ${projects}">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title fw-bold" th:text="${project.name}">Nombre</h5>
            <p class="card-text text-muted" th:text="${project.description}">Descripción...</p>
          </div>
          <div class="card-footer bg-transparent border-top-0 d-flex justify-content-between pb-3">
            <!-- Botón para ver los Mocks de este proyecto -->
            <a th:href="@{'/projects/' + ${project.id} + '/mocks'}" class="btn btn-secondary btn-sm"
              th:text="#{project.btn.view_mocks}">
              Ver Mocks
            </a>
            <a th:href="@{'/projects/delete/' + ${project.id}}" class="btn btn-outline-danger btn-sm"
              th:data-confirm-delete="#{project.delete.confirm}"
              onclick="return confirm(this.getAttribute('data-confirm-delete'));">
              <i class="fas fa-trash"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Crear Proyecto -->
  <div class="modal fade" id="createProjectModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form action="/projects/create" method="post">
          <div class="modal-header">
            <h5 class="modal-title fw-bold" th:text="#{project.modal.title}">Nuevo Proyecto</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label" th:text="#{project.name}">Nombre del Proyecto</label>
              <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label" th:text="#{project.description}">Descripción</label>
              <textarea name="description" class="form-control" rows="3"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
              th:text="#{btn.cancel}">Cancelar</button>
            <button type="submit" class="btn btn-primary" th:text="#{btn.save}">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
