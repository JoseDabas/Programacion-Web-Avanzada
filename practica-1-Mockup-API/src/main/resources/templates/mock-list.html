<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <title th:text="#{mock.titulo}">Mocks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet" />
</head>

<body>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 th:text="#{mock.titulo}" class="fw-bold">Gestión de Mocks</h2>
            <div>
                <a href="/projects" class="btn btn-outline-secondary me-2" th:text="#{mock.btn.volver}">Volver</a>
                <a th:href="@{'/projects/' + ${projectId} + '/mocks/create'}" class="btn btn-primary">
                    <i class="fas fa-plus"></i> <span th:text="#{mock.btn.nuevo}">Crear</span>
                </a>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Método</th>
                            <th>Ruta</th>
                            <th>Status</th>
                            <th>Expiración</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="mock : ${mocks}">
                            <td>
                                <span class="badge bg-primary" th:text="${mock.method}">GET</span>
                            </td>
                            <td th:text="${mock.path}">/api/test</td>
                            <td>
                                <span class="badge bg-secondary" th:text="${mock.responseStatus}">200</span>
                            </td>
                            <td th:text="${#temporals.format(mock.expirationDate, 'dd-MM-yyyy HH:mm')}">Fecha</td>
                            <td>
                                <!-- Botón para probar el mock -->
                                <a th:href="@{'/mock_project' + ${mock.path}}" target="_blank"
                                    class="btn btn-sm btn-outline-secondary" title="Probar">
                                    <i class="fas fa-play"></i>
                                </a>
                                <!-- Edit Button -->
                                <a th:href="@{'/projects/' + ${projectId} + '/mocks/edit/' + ${mock.id}}"
                                    class="btn btn-sm btn-outline-secondary" title="Editar">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="@{'/projects/' + ${projectId} + '/mocks/delete/' + ${mock.id}}"
                                    class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Eliminar?');"
                                    title="Eliminar">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div th:if="${mocks.empty}" class="alert alert-light border text-center" th:text="#{mock.lista.vacia}">
                    Vacio
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE TOKEN GENERADO (Se abre solo al crear) -->
    <div th:if="${newToken}" class="modal fade" id="tokenModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Mock Creado & Token Generado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Este Mock está protegido. Aquí tienes tu token de acceso (expira junto con el endpoint):</p>
                    <div class="input-group">
                        <textarea id="tokenArea" class="form-control" rows="4" readonly
                            th:text="${newToken}"></textarea>
                    </div>
                    <div class="mt-2 text-end">
                        <button onclick="copiarToken()" class="btn btn-outline-primary btn-sm">
                            <i class="fas fa-copy"></i> Copiar al Portapapeles
                        </button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts de Bootstrap y Lógica del Modal -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script th:if="${newToken}">
        // Si existe un token nuevo, abrir el modal automáticamente al cargar
        window.onload = function () {
            var myModal = new bootstrap.Modal(document.getElementById('tokenModal'));
            myModal.show();
        };

        function copiarToken() {
            var copyText = document.getElementById("tokenArea");
            copyText.select();
            document.execCommand("copy");
            alert("Token copiado!");
        }
    </script>
</body>

</html>



</body>

</html>
